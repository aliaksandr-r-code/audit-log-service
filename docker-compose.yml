services:
  postgres:
    image: postgres:16-alpine
    container_name: audit-log-postgres
    environment:
      POSTGRES_DB: audit_log
      POSTGRES_USER: audit_log
      POSTGRES_PASSWORD: audit_log
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit_log -d audit_log"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
