spring:
  application:
    name: audit-log-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/audit_log}
    username: ${SPRING_DATASOURCE_USERNAME:audit_log}
    password: ${SPRING_DATASOURCE_PASSWORD:audit_log}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: ${SERVER_PORT:8080}
